<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUESTIONS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>QUESTIONS</h1>
        <div class="game-area">
            <div id="question-display" class="question-display">
                <p id="question-text">Click START to begin</p>
            </div>
            <div class="controls">
                <button id="start-btn" class="btn">START</button>
                <button id="next-btn" class="btn hidden">NEXT</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
